<h2>Component One</h2>
<form [formGroup]="formService.form" (ngSubmit)="onSubmit()">
  <div class="field">
    <label>Title</label>
    <input type="text" formControlName="title">
  </div>

  <div class="field">
    <label>Description</label>
    <input type="text" formControlName="description">
  </div>

  <div class="field">
    <label>Comment</label>
    <input type="text" formControlName="comment">
  </div>

  <button type="submit">
    Submit
  </button>
</form>

<br>

<form [formGroup]="formService.formData">
  <div class="field">
    <label>Title</label>
    <input type="text" formControlName="title">
  </div>

  <div class="field">
    <label>Last name</label>
    <input type="text" formControlName="lastName">
  </div>

  <div class="field">
    <label>Age</label>
    <input type="text" formControlName="age">
  </div>

  <button type="button" (click)="postDataHandel()">
    Post Data
  </button>
</form>
